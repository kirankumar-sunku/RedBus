# =============================================
# RedBus Clone - Application Configuration
# =============================================

# Server
server.port=8080

# ---- MySQL DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/redbus?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=RedBusSecretKey_MustBe256BitsOrMoreForHS256Algorithm_ChangeInProduction!
jwt.expiration=3600000

# ---- Scheduling ----
spring.task.scheduling.pool.size=5

# ---- Logging ----
logging.level.com.redbus=DEBUG
logging.level.org.springframework.security=INFO

# =============================================
# Redis Cache Configuration
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:1234}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# =============================================
# Actuator - Cache & Health Monitoring
# =============================================
management.endpoints.web.exposure.include=health,caches,metrics
management.endpoint.caches.enabled=true
management.endpoint.health.show-details=always


